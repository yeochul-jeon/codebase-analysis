services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      ANALYZE_UPLOAD_TOKEN: ${ANALYZE_UPLOAD_TOKEN:?ANALYZE_UPLOAD_TOKEN must be set in docker/.env}
      DB_PATH: /data/index.db
      BLOBS_DIR: /data/blobs
      PORT: "3000"
      NODE_ENV: production
    volumes:
      - ca_data:/data
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  ca_data:
